# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Gemini"

ai_usage_summary: |
  Used Gemini for architectural discussion, drafting scoring logic, and refactoring the rule execution engine into native Python for maximum speed. No candidate data was sent to any external APIs during ranking.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  A rule-based ranking engine utilizing a 5-dimension weighted scoring rubric and strict additive honeypot anomaly defense checks (e.g., career tenure exceeding age). The system features a deterministic template assembler mapping candidate rank bands to JD-aligned justifications and real notice period/location concerns. Optimized with pure native Python logic to achieve extreme CPU performance, filtering and scoring 100,000 candidates in under 10 seconds with zero pre-computation and zero network dependency.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
